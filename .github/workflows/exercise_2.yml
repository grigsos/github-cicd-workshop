name: Python CI-ex2

on: push

jobs:
  unittests-ex2:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: pip install pytest
    - name: Run tests
      run: pytest
      working-directory: content/exercise_2

  lint-ex2:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
    - name: Install Black
      run: pip install black
    - name: Check code format
      run: flake8
      working-directory: content/exercise_2
